<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настоящие Курсы Биржи Live</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0e11;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            color: #f3ba2f;
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
        }
        .widget-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            background-color: #131722;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2e39;
        }
    </style>
</head>
<body>

    <h1>Реальный онлайн-поток криптовалют с бирж</h1>

    <div class="widget-container">
        <!-- Официальный контейнер TradingView -->
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            {
              "colorTheme": "dark",
              "dateRange": "12M",
              "showChart": true,
              "locale": "ru",
              "width": "100%",
              "height": "100%",
              "largeChartUrl": "",
              "isTransparent": false,
              "showSymbolLogo": true,
              "showFloatingTooltip": false,
              "tabs": [
                {
                  "title": "Криптовалюты Live",
                  "symbols": [
                    { "s": "BINANCE:BTCUSDT", "d": "Bitcoin (BTC)" },
                    { "s": "BINANCE:ETHUSDT", "d": "Ethereum (ETH)" },
                    { "s": "BINANCE:SOLUSDT", "d": "Solana (SOL)" },
                    { "s": "BINANCE:TONUSDT", "d": "Toncoin (TON)" },
                    { "s": "BINANCE:XRPUSDT", "d": "Ripple (XRP)" }
                  ]
                }
              ]
            }
            </script>
        </div>

</html>
