<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крипто-Бухгалтерия Live</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0e11;
            color: #eaecef;
            padding: 40px 20px;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
        }
        h1 {
            color: #f3ba2f;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #848e9c;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .total-balance {
            background-color: #1e2329;
            border: 1px solid #f3ba2f;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }
        .total-balance h2 {
            margin: 0 0 10px 0;
            color: #848e9c;
            font-size: 16px;
            text-transform: uppercase;
        }
        .total-amount {
            font-size: 32px;
            font-weight: bold;
            color: #0ecb81;
            font-family: monospace;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #181a20;
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #2b3139;
        }
        th {
            background-color: #21262c;
            color: #848e9c;
            font-weight: 500;
        }
        tr:hover {
            background-color: #21262c;
        }
        .coin-name {
            font-weight: bold;
            color: #ffffff;
        }
        .price, .subtotal {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
        }
        input {
            width: 90px;
            padding: 8px;
            background-color: #2b3139;
            border: 1px solid #474f57;
            border-radius: 6px;
            color: #ffffff;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        input:focus {
            outline: 1px solid #f3ba2f;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Крипто-Бухгалтерия Live</h1>
        <div class="subtitle">Цены обновляются напрямую с Binance через защищенный шлюз</div>

        <!-- Общий баланс кошелька -->
        <div class="total-balance">
            <h2>Общая стоимость активов (USD)</h2>
            <div class="total-amount" id="total-portfolio-value">$0.00</div>
        </div>

        <!-- Таблица активов -->
        <table>
            <thead>
                <tr>
                    <th>Монета</th>
                    <th>Живой курс (USD)</th>
                    <th>Ваше количество</th>
                    <th>Стоимость (USD)</th>
                </tr>
            </thead>
            <tbody>
                <!-- Строка Bitcoin -->
                <tr>
                    <td><span class="coin-name">Bitcoin (BTC)</span></td>
                    <td class="price" id="btc-price">Загрузка...</td>
                    <td><input type="number" id="btc-amount" value="0.5" step="0.01" min="0"></td>
                    <td class="subtotal" id="btc-subtotal">$0.00</td>
                </tr>
                <!-- Строка Ethereum -->
                <tr>
                    <td><span class="coin-name">Ethereum (ETH)</span></td>
                    <td class="price" id="eth-price">Загрузка...</td>
                    <td><input type="number" id="eth-amount" value="2.0" step="0.1" min="0"></td>
                    <td class="subtotal" id="eth-subtotal">$0.00</td>
                </tr>
                <!-- Строка Solana -->
                <tr>
                    <td><span class="coin-name">Solana (SOL)</span></td>
                    <td class="price" id="sol-price">Загрузка...</td>
                    <td><input type="number" id="sol-amount" value="15" step="1" min="0"></td>
                    <td class="subtotal" id="sol-subtotal">$0.00</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Глобальный объект для хранения текущих цен биржи
        const cryptoPrices = { bitcoin: 0, ethereum: 0,  solana: 0 };

        // Элементы ввода количества монет
        const amounts = {
            bitcoin: document.getElementById('btc-amount'),
            ethereum: document.getElementById('eth-amount'),
            solana: document.getElementById('sol-amount')
        };

        // Элементы вывода результатов
        const priceElements = {
            bitcoin: document.getElementById('btc-price'),
            ethereum: document.getElementById('eth-price'),
            solana: document.getElementById('sol-price')
        };

        const subtotalElements = {
            bitcoin: document.getElementById('btc-subtotal'),
            ethereum: document.getElementById('eth-subtotal'),
            solana: document.getElementById('sol-subtotal')
        };

        const totalPortfolioElement = document.getElementById('total-portfolio-value');

        // Функция математического пересчета всей бухгалтерии
        function calculateAccounting() {
            let totalPortfolioSum = 0;

            for (const coin in cryptoPrices) {
                const price = cryptoPrices[coin];
                // Получаем количество из поля ввода, если там пусто — считаем за 0
                const amount = parseFloat(amounts[coin].value) || 0; 
                
                // Считаем стоимость конкретной монеты (Цена * Количество)
                const subtotal = price * amount;
                totalPortfolioSum += subtotal;

                // Выводим стоимость этой позиции на экран
                subtotalElements[coin].innerText = '$' + subtotal.toFixed(2);
            }

            // Выводим Общую итоговую сумму кошелька
            totalPortfolioElement.innerText = '$' + totalPortfolioSum.toFixed(2);
        }

        // Запрашиваем цены у официального API (поддерживает Safari и https://)
        async function fetchLivePrices() {
            try {
                const response = await fetch("https://coincap.io");
                const json = await response.json();
                
                json.data.forEach(coin => {
                    const price = parseFloat(coin.priceUsd);
                    cryptoPrices[coin.id] = price;
                    
                    // Обновляем живую цену в таблице
                    priceElements[coin.id].innerText = '$' + price.toFixed(2);
                });

                // После обновления цен сразу пересчитываем бухгалтерию
                calculateAccounting();
            } catch (error) {
                console.error("Ошибка обновления котировок");
            }
        }

        // Слушаем изменения в полях ввода (если пользователь меняет количество монет вручную)
        Object.values(amounts).forEach(input => {
            input.addEventListener('input', calculateAccounting);
        });

        // Запуск: мгновенный опрос и обновление каждые 3 секунды
        fetchLivePrices();
        setInterval(fetchLivePrices, 3000);
    </script>
</body>
</html>
